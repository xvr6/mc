services:
  mc:
    container_name: yoinky4_server
    image: itzg/minecraft-server:latest
    ports:
      - 3623:25565
      - 8101:8100
      - 25576:25575
    environment:
      EULA: "TRUE"
      MOTD: "Yoinky 4.0"
      ENABLE_WHITELIST: "TRUE"
      PACKWIZ_URL: "https://raw.githubusercontent.com/xvr6/mc/refs/heads/main/yoinky4/pack.toml"
      MEMORY: "16G"
      USE_AIKAR_FLAGS: "true"
      # USE_MEOWICE_FLAGS: "TRUE"
      ENABLE_ROLLING_LOGS: "true"
      TYPE: "FABRIC"
      VERSION: "1.20.1"
      RCON_PASSWORD: "522391a27f72ca3b06afa496"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "12"
      SEED: "merigold"
      DIFFICULTY: "2"
      ALLOW_FLIGHT: "true"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - ./data:/data
  tunnel:
    container_name: yoinky_tunnels
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=<this used to be a secret but it was disabled :3>
